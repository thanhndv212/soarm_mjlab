name: CI

# Two-job split per SOARM_MJLAB_ROADMAP.md Phase 3: this `fast` job (lint +
# CPU-only tests) blocks merges. A `train-smoke` job (a few PPO iterations on
# a tiny env, still CI-safe) is added in Phase 1 once scripts/train.py and
# the Reach task exist — full GPU training never runs in CI.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check soarm_mjlab tests

      - name: Test
        run: pytest
