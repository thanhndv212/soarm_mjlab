name: CI

# Two-job split per SOARM_MJLAB_ROADMAP.md Phase 3: this `fast` job (lint +
# CPU-only tests) blocks merges. A `train-smoke` job (a few PPO iterations on
# a tiny env, still CI-safe) is added in Phase 1 once scripts/train.py and
# the Reach task exist — full GPU training never runs in CI.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync (cpu extra, --locked fails the build on lockfile drift)
        run: uv sync --locked --extra cpu --group dev

      - name: Lint
        run: uv run ruff check soarm_mjlab tests

      - name: Test
        run: FORCE_CPU=1 uv run pytest
